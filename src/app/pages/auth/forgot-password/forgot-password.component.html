<section class="card">
  
  <div class="card-grid"></div>
  
  <div class="card-circles">
    <div class="card-circle"></div>
    <div class="card-circle"></div>
    <div class="card-circle"></div>
  </div>
  <div class="card-card">
    <div class="card-brand" routerLink="/auth/login" style="cursor:pointer">
      <div class="card-brand-icon">
        <img alt="logo" src="./assets/images/newLogo.svg">
      </div>
    </div>
    
    <h2 class="card-title">Forgot password</h2>
    <p class="card-sub">Enter your email and we'll send you a reset link.</p>
    <form (ngSubmit)="onSubmit()" [formGroup]="forgotForm">
      <div class="form-group">
        <label class="dark-label">Email Address</label>
        <div class="dark-input-wrap">
          <input
                  class="dark-input"
                  formControlName="email"
                  name="email"
                  placeholder="Enter your Email"
                  required
                  type="email"
          />
        </div>
      </div>
      <div class="dark-row">
        <div></div>
        <button class="dark-forgot" type="button" routerLink="/auth/login">
          Back to Login
        </button>
      </div>
      <button [disabled]="forgotForm.invalid || isLoading" class="btn-glow" type="submit">
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>
  </div>
  
  
  <div class="powered-by">
    Powered by <img src="./assets/images/infotech.png" alt="">
  </div>
</section>
