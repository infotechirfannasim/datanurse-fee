<div class="auth-container">
    <div class="auth-card">
        <h2>Forgot Password?</h2>
        <p>Enter your email and we'll send you a reset link.</p>

        <form (ngSubmit)="onSubmit()" [formGroup]="forgotForm">
            <div class="form-group">
                <input formControlName="email" placeholder="Enter your email" required type="email">
            </div>

            <button [disabled]="forgotForm.invalid || isLoading" class="btn-primary" type="submit">
                {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
            </button>
        </form>

        <p class="text-center mt-3">
            <a routerLink="/login">Back to Login</a>
        </p>
    </div>
</div>

<section class="card">

    <div class="card-grid"></div>

    <div class="card-circles">
        <div class="card-circle"></div>
        <div class="card-circle"></div>
        <div class="card-circle"></div>
    </div>
    <div class="card-card">
        <div class="card-brand">
            <div class="card-brand-icon">
                <img alt="logo" src="./assets/images/logo.png">
            </div>
            <div class="card-brand-name">DATA NURSE</div>
            <div class="card-brand-sub">Cardiac Surgery Data Collection</div>
        </div>

        <h2 class="card-title">Forgot password</h2>
        <p class="card-sub">Enter your email and we'll send you a reset link.</p>
        <form (ngSubmit)="onSubmit()" [formGroup]="forgotForm">
            <div class="form-group">
                <input formControlName="email" placeholder="Enter your email" required type="email">
            </div>

            <button [disabled]="forgotForm.invalid || isLoading" class="btn-primary" type="submit">
                {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
            </button>
        </form>
    </div>
</section>
