<section class="card">
  
  <div class="card-grid"></div>
  
  <div class="card-circles">
    <div class="card-circle"></div>
    <div class="card-circle"></div>
    <div class="card-circle"></div>
  </div>
  
  <div class="card-card">
      <div class="card-brand">
      <div class="card-brand-icon">
        <img alt="logo" src="./assets/images/logo.png">
      </div>
      <div class="card-brand-name">DATA NURSE</div>
      <div class="card-brand-sub">Clinical Data Management System</div>
    </div>
    
    <h2 class="card-title">Secure Sign In</h2>
    
    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm" class="login-form">
        <div class="form-group">
        <label class="dark-label">Email Address</label>
        <div class="dark-input-wrap">
          <input
                  class="dark-input"
                  formControlName="email"
                  name="email"
                  placeholder="Enter your Email"
                  required
                  type="email"
          />
        </div>
      </div>
        <div class="form-group">
        <label class="dark-label">Password</label>
        
        <div class="dark-input-wrap">
          <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="dark-input has-icon"
                  formControlName="password"
                  id="password"
                  name="password"
                  placeholder="Enter your password"
          >
          <button (click)="togglePassword()" class="password-toggle" type="button">
            @if (!showPassword) {
              <svg fill="none" height="20" id="eyeOffIcon" stroke="currentColor"
                   stroke-linecap="round"
                   stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20">
                <path
                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" x2="23" y1="1" y2="23"></line>
              </svg>
            } @else {
              <svg fill="none" height="20" id="eyeIcon" stroke="currentColor" stroke-linecap="round"
                   stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
      </div>
        <div class="dark-row">
        <label class="dark-check">
          <input type="checkbox"> Remember me
        </label>
        
        <button class="dark-forgot" type="button" routerLink="/auth/forgot-password">
          Forgot Password?
        </button>
      </div>
      
      <div class="form-group turnstile-wrap">
        <div id="turnstile-container"></div>
      </div>
      <button [disabled]="loginForm.invalid || isLoading" class="btn-glow" type="submit">
        {{ isLoading ? 'Signing In...' : 'Sign In' }}
      </button>
    
    </form>
  </div>
  
  
  <div class="powered-by">
    Powered by <img src="./assets/images/infotech.png" alt="">
  </div>
</section>
