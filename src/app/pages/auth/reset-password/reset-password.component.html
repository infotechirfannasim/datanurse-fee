<section class="card">
  
  <div class="card-grid"></div>
  
  <div class="card-circles">
    <div class="card-circle"></div>
    <div class="card-circle"></div>
    <div class="card-circle"></div>
  </div>
  
  <div class="card-card">
    <div class="card-brand">
      <div class="card-brand-icon" routerLink="/auth/login">
        <img alt="logo" src="./assets/images/newLogo.svg">
      </div>
    </div>
    
    <h2 class="card-title">Reset Password</h2>
    
    <!-- Alerts -->
    @if (message) {
      <div class="success-msg">{{ message }}</div>
    }
    
    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }
    
    <!-- FORM -->
    <form (ngSubmit)="onSubmit()" [formGroup]="resetForm" class="login-form">
      
      <!-- Password -->
      <div class="form-group">
        <label class="dark-label">New Password</label>
        
        <div class="dark-input-wrap">
          <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="dark-input"
                  formControlName="password"
                  placeholder="Enter new password"
          />
          
          <button (click)="togglePassword()" class="password-toggle" type="button">
            @if (!showPassword) {
              <svg fill="none" height="20" id="eyeOffIcon" stroke="currentColor"
                   stroke-linecap="round"
                   stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20">
                <path
                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" x2="23" y1="1" y2="23"></line>
              </svg>
            } @else {
              <svg fill="none" height="20" id="eyeIcon" stroke="currentColor" stroke-linecap="round"
                   stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
      </div>
      
      <!-- Confirm Password -->
      <div class="form-group">
        <label class="dark-label">Confirm Password</label>
        
        <div class="dark-input-wrap">
          <input
                  [type]="showConfirmPassword ? 'text' : 'password'"
                  class="dark-input"
                  formControlName="confirmPassword"
                  placeholder="Confirm password"
          />
          
          <button (click)="toggleConfirmPassword()" class="password-toggle" type="button">
            @if (!showConfirmPassword) {
              <svg fill="none" height="20" id="eyeOffIcon" stroke="currentColor"
                   stroke-linecap="round"
                   stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20">
                <path
                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" x2="23" y1="1" y2="23"></line>
              </svg>
            } @else {
              <svg fill="none" height="20" id="eyeIcon" stroke="currentColor" stroke-linecap="round"
                   stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
        
        @if (passwordsMismatch()) {
          <small class="error-msg">Passwords do not match</small>
        }
      </div>
      
      <div class="dark-row">
        <div></div>
        <button class="dark-forgot" type="button" routerLink="/auth/login">
          Back to Login
        </button>
      </div>
      
      <!-- Submit -->
      <button
              [disabled]="resetForm.invalid || passwordsMismatch() || isLoading"
              class="btn-glow"
              type="submit"
      >
        @if (isLoading) {
          Processing...
        } @else {
          Reset Password
        }
      </button>
    
    </form>
  
  </div>
</section>
