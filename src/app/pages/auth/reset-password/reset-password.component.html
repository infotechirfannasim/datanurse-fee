<section class="card">

    <div class="card-grid"></div>

    <div class="card-circles">
        <div class="card-circle"></div>
        <div class="card-circle"></div>
        <div class="card-circle"></div>
    </div>

    <div class="card-card">

        <!-- Header -->
        <div class="card-brand">
            <div class="card-brand-icon">
                <img alt="logo" src="./assets/images/logo.png">
            </div>
            <div class="card-brand-name">DATA NURSE</div>
            <div class="card-brand-sub">Clinical Data Management System</div>
        </div>

        <h2 class="card-title">Reset Password</h2>

        <!-- Alerts -->
        @if (message) {
            <div class="success-msg">{{ message }}</div>
        }

        @if (error) {
            <div class="error-msg">{{ error }}</div>
        }

        <!-- FORM -->
        <form (ngSubmit)="onSubmit()" [formGroup]="resetForm" class="login-form">

            <!-- Password -->
            <div class="form-group">
                <label class="dark-label">New Password</label>

                <div class="dark-input-wrap">
                    <input
                            [type]="showPassword ? 'text' : 'password'"
                            class="dark-input"
                            formControlName="password"
                            placeholder="Enter new password"
                    />

                    <button (click)="togglePassword()" class="password-toggle" type="button">
                        👁
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label class="dark-label">Confirm Password</label>

                <div class="dark-input-wrap">
                    <input
                            [type]="showConfirmPassword ? 'text' : 'password'"
                            class="dark-input"
                            formControlName="confirmPassword"
                            placeholder="Confirm password"
                    />

                    <button (click)="toggleConfirmPassword()" class="password-toggle" type="button">
                        👁
                    </button>
                </div>

                @if (passwordsMismatch()) {
                    <small class="error-msg">Passwords do not match</small>
                }
            </div>

            <!-- Submit -->
            <button
                    [disabled]="resetForm.invalid || passwordsMismatch() || isLoading"
                    class="btn-glow"
                    type="submit"
            >
                @if (isLoading) {
                    Processing...
                } @else {
                    Reset Password
                }
            </button>

            <!-- Back -->
            <div class="dark-row">
                <a class="dark-forgot" routerLink="/auth/login">
                    Back to Login
                </a>
            </div>

        </form>

    </div>
</section>
