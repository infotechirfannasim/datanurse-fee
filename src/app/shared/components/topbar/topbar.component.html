<div class="topbar">
    <div class="topbar-left">
        <svg class="sidebar-toggle" (click)="sidebarState.toggle()" width="16" height="16" viewBox="0 0 24 24"
             fill="none"
             stroke="#64748B" stroke-width="2.5" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <div>
            <div class="topbar-title">{{ navService.currentMeta().title }}</div>
            <div class="topbar-breadcrumb">
                <span>{{ navService.currentMeta().breadcrumb }}</span>
            </div>
        </div>
    </div>

    <div class="topbar-right">
        <!--     Profile Button -->
        <div class="topbar-btn" id="notif-wrap" style="position:relative;">
            <div class="profile-side" (click)="toggleNotif()">
                @if (getProfileImageUrl()) {
                    <img [src]="getProfileImageUrl()" alt="Profile Photo" class="s-avatar s-avatar-img">
                } @else {
                    <div class="s-avatar">{{ getUserInitials(userInfo()) }}</div>
                }

                <div>
          <span class="s-name">
            {{ userInfo()?.firstName + ' ' + userInfo()?.lastName }}
          </span>
                </div>

                <!-- Toggle Icon -->
                <div class="dropdown-arrow" [class.open]="notifOpen()">
                    <svg _ngcontent-ng-c2567396646="" fill="none" height="16" viewBox="0 0 24 24" width="16">
                        <polyline _ngcontent-ng-c2567396646="" points="6 9 12 15 18 9" stroke="CurrentColor"
                                  stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                        </polyline>
                    </svg>
                </div>
            </div>

            @if (notifOpen()) {
                <div class="notif-dropdown">
                    <div class="notif-header">
                        <span class="notif-title">{{ userInfo()?.role?.label }}</span>
                    </div>
                    <a class="notif-item unread" (click)="navigate()">
                        <div class="notif-ico">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="#2251CC" stroke-width="2"/>
                                <circle cx="12" cy="7" r="4" stroke="#2251CC" stroke-width="2"/>
                            </svg>
                        </div>
                        <div>
                            Profile
                        </div>
                    </a>
                    <div class="notif-item unread" (click)="logout()">
                        <div class="notif-ico">
                            <div class="user-menu-item logout">
                                <svg fill="none" height="14" viewBox="0 0 24 24" width="18">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" fill="none" stroke="red"
                                          stroke-width="2"/>
                                    <polyline fill="none" points="16 17 21 12 16 7" stroke="red" stroke-width="2"/>
                                    <line stroke="red" stroke-width="2" x1="21" x2="9" y1="12" y2="12"/>
                                </svg>
                            </div>
                        </div>
                        <div>
                            Logout
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>
</div>
